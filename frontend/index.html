<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AccessMap</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #map { flex: 1; width: 100%; }

    /* ── FAB ── */
    #fab {
      position: absolute;
      bottom: 28px; right: 20px;
      z-index: 1000;
      width: 62px; height: 62px;
      border-radius: 50%;
      background: #e94560;
      border: none; color: #fff;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab:active { transform: scale(.93); }

    /* ── Locate ── */
    #locateBtn {
      position: absolute;
      bottom: 108px; right: 20px;
      z-index: 1000;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: #16213e;
      border: 2px solid #e94560;
      color: #e94560; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      -webkit-tap-highlight-color: transparent;
    }
    #locateBtn:active { background: #e94560; color: #fff; }

    /* ── Bottom sheet ── */
    #sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2000;
      background: #16213e;
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform .25s ease;
      max-height: 88dvh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #sheet.open { transform: translateY(0); }

    /* ── Step 1: Category picker ── */
    #step1 {
      padding: 20px 16px 32px;
    }

    #step1 h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: #889;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .cat-btn {
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 16px 4px 12px;
      color: #dde;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      -webkit-tap-highlight-color: transparent;
      transition: background .12s, border-color .12s;
    }
    .cat-btn .icon { font-size: 30px; line-height: 1; }
    .cat-btn:active { background: #1a2a50; border-color: #e94560; }

    .cancel-row { display: flex; justify-content: center; }
    .cancel-text-btn {
      padding: 12px 36px;
      border-radius: 10px;
      border: 1px solid #334;
      background: transparent;
      color: #778;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Step 2: Detail ── */
    #step2 {
      display: none;
      padding: 20px 16px 36px;
    }
    #step2.active { display: block; }

    .step2-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #0f3460;
      border: none; color: #e94560;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .selected-cat {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .selected-cat .icon { font-size: 26px; line-height: 1; }
    .selected-cat .label { font-size: 18px; font-weight: 700; }
    .close-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid #334;
      color: #778; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #556;
      margin-bottom: 8px;
    }
    .section-label .opt {
      font-size: 10px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: #445;
      margin-left: 4px;
    }

    /* ── Subtype grid ── */
    .subtype-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .sub-btn {
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 11px 8px;
      color: #bbc;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .1s, background .1s, color .1s;
    }
    .sub-btn.selected { border-color: #e94560; background: #1a1a3e; color: #fff; }

    /* ── Difficulty ── */
    .difficulty-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .diff-btn {
      flex: 1;
      padding: 10px 4px;
      border-radius: 8px;
      border: 2px solid transparent;
      background: #0f3460;
      color: #bbc;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .1s, color .1s;
    }
    .diff-btn.selected { border-color: #e94560; color: #fff; }

    /* ── Note ── */
    #noteInput {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334;
      background: #0a1628;
      color: #eee;
      font-size: 14px;
      resize: none;
      margin-bottom: 14px;
      font-family: inherit;
    }
    #noteInput::placeholder { color: #445; }

    /* ── Photo ── */
    .photo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    #photoBtn {
      padding: 9px 14px;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 8px;
      color: #bbc;
      font-size: 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #photoName { font-size: 12px; color: #778; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #photoInput { display: none; }

    /* ── Save ── */
    #saveBtn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Toast ── */
    #toast {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      background: #0f3460;
      color: #eee;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 3000;
      opacity: 0;
      transition: opacity .3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .leaflet-tile-pane { filter: brightness(.85) saturate(.9); }
  </style>
</head>
<body>

<div id="map"></div>
<button id="locateBtn" title="Go to my location">⊕</button>
<button id="fab" title="Drop a marker">＋</button>

<!-- ── Bottom sheet ── -->
<div id="sheet">

  <!-- Step 1: Category picker -->
  <div id="step1">
    <h2>What did you find?</h2>
    <div id="categoryGrid" class="category-grid"></div>
    <div class="cancel-row">
      <button class="cancel-text-btn" id="cancelBtn1">Cancel</button>
    </div>
  </div>

  <!-- Step 2: Detail -->
  <div id="step2">
    <div class="step2-header">
      <button class="back-btn" id="backBtn">‹</button>
      <div class="selected-cat">
        <span class="icon" id="selectedCatIcon"></span>
        <span class="label" id="selectedCatLabel"></span>
      </div>
      <button class="close-btn" id="cancelBtn2">✕</button>
    </div>

    <div class="section-label">Subtype <span class="opt">(optional)</span></div>
    <div id="subtypeGrid" class="subtype-grid"></div>

    <div class="section-label">Difficulty <span class="opt">(optional)</span></div>
    <div class="difficulty-row">
      <button class="diff-btn" data-val="low">🟢 Easy</button>
      <button class="diff-btn" data-val="medium">🟡 Tricky</button>
      <button class="diff-btn" data-val="high">🔴 Hard</button>
    </div>

    <div class="section-label">Note <span class="opt">(optional)</span></div>
    <textarea id="noteInput" rows="2" placeholder="e.g. passable but slow, seasonal mud..."></textarea>

    <div class="photo-row">
      <button id="photoBtn">📷 Photo</button>
      <span id="photoName">No photo</span>
      <input type="file" id="photoInput" accept="image/*" capture="environment" />
    </div>

    <button id="saveBtn">Save marker</button>
  </div>

</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const API = "/api";

// ── Data ──────────────────────────────────────────────────────────────────────

const CATEGORIES = [
  { id: "gate",          icon: "🚪", label: "Gate"    },
  { id: "stile",         icon: "🪜", label: "Stile"   },
  { id: "steep",         icon: "⛰️",  label: "Steep"   },
  { id: "mud",           icon: "💧", label: "Mud"     },
  { id: "narrow",        icon: "↔️",  label: "Narrow"  },
  { id: "rough_surface", icon: "🪨", label: "Rough"   },
  { id: "other",         icon: "❓", label: "Other"   },
];

const SUBTYPES = {
  gate:          ["Standard gate", "Kissing gate", "Locked gate", "Narrow gate", "Heavy gate", "Other gate"],
  stile:         ["Standard stile", "Ladder stile", "Narrow stile", "High step", "Broken / awkward", "Other stile"],
  steep:         ["Short steep", "Long climb", "Long descent", "Slippery slope", "Steps", "Other steep"],
  mud:           ["Light mud", "Deep mud", "Standing water", "Boggy ground", "Seasonal mud", "Other mud"],
  narrow:        ["Narrow path", "Overgrown path", "Narrow bridge", "Narrow gap", "Exposed edge", "Other narrow"],
  rough_surface: ["Uneven ground", "Loose stones", "Tree roots", "Ruts", "Broken surface", "Other rough"],
  other:         ["Fallen tree", "Livestock", "Flooding", "Blocked path", "Poor signage", "Other"],
};

const TYPE_COLORS = {
  gate: "#4fc3f7", kissing_gate: "#29b6f6",
  stile: "#f06292", steep: "#ff8a65",
  mud: "#a1887f", narrow: "#ce93d8",
  rough_surface: "#90a4ae", other: "#ccc",
};

// ── Map setup ─────────────────────────────────────────────────────────────────

const map = L.map("map", { zoomControl: false }).setView([51.5, -1.0], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
  maxZoom: 19,
}).addTo(map);
L.control.zoom({ position: "topleft" }).addTo(map);

// ── State ─────────────────────────────────────────────────────────────────────

let selectedCategory = null;
let selectedSubtype   = null;
let selectedDifficulty = null;
let pendingLat = null;
let pendingLng = null;
let locationMarker = null;
let currentPhoto = null;

// ── Build category grid ────────────────────────────────────────────────────────

const categoryGrid = document.getElementById("categoryGrid");
CATEGORIES.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "cat-btn";
  btn.innerHTML = `<span class="icon">${cat.icon}</span>${cat.label}`;
  btn.addEventListener("click", () => goToStep2(cat));
  categoryGrid.appendChild(btn);
});

// ── Step navigation ───────────────────────────────────────────────────────────

function goToStep2(cat) {
  selectedCategory  = cat;
  selectedSubtype   = null;
  selectedDifficulty = null;
  currentPhoto      = null;

  // Header
  document.getElementById("selectedCatIcon").textContent  = cat.icon;
  document.getElementById("selectedCatLabel").textContent = cat.label;

  // Build subtype grid
  const grid = document.getElementById("subtypeGrid");
  grid.innerHTML = "";
  (SUBTYPES[cat.id] || []).forEach(label => {
    const btn = document.createElement("button");
    btn.className = "sub-btn";
    btn.textContent = label;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sub-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedSubtype = label;
    });
    grid.appendChild(btn);
  });

  // Reset difficulty / note / photo
  document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("selected"));
  document.getElementById("noteInput").value = "";
  document.getElementById("photoName").textContent = "No photo";
  document.getElementById("photoInput").value = "";

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").classList.add("active");
}

function goToStep1() {
  document.getElementById("step1").style.display = "";
  document.getElementById("step2").classList.remove("active");
}

function openSheet(lat, lng) {
  pendingLat = lat;
  pendingLng = lng;
  selectedCategory   = null;
  selectedSubtype    = null;
  selectedDifficulty = null;
  currentPhoto       = null;
  goToStep1();
  document.getElementById("sheet").classList.add("open");
}

function closeSheet() {
  document.getElementById("sheet").classList.remove("open");
  setTimeout(goToStep1, 280);
}

document.getElementById("cancelBtn1").addEventListener("click", closeSheet);
document.getElementById("cancelBtn2").addEventListener("click", closeSheet);
document.getElementById("backBtn").addEventListener("click", goToStep1);

// ── Difficulty ────────────────────────────────────────────────────────────────

document.querySelectorAll(".diff-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedDifficulty = btn.dataset.val;
  });
});

// ── Photo ─────────────────────────────────────────────────────────────────────

document.getElementById("photoBtn").addEventListener("click", () => {
  document.getElementById("photoInput").click();
});
document.getElementById("photoInput").addEventListener("change", e => {
  currentPhoto = e.target.files[0] || null;
  document.getElementById("photoName").textContent = currentPhoto ? currentPhoto.name : "No photo";
});

// ── FAB ───────────────────────────────────────────────────────────────────────

document.getElementById("fab").addEventListener("click", () => {
  const ll = locationMarker ? locationMarker.getLatLng() : map.getCenter();
  openSheet(ll.lat, ll.lng);
});

// ── Long-press on map to choose exact spot ────────────────────────────────────

let pressTimer = null;
map.on("mousedown touchstart", e => {
  const ll = e.latlng || (e.touches && map.mouseEventToLatLng(e.touches[0]));
  if (!ll) return;
  pressTimer = setTimeout(() => openSheet(ll.lat, ll.lng), 600);
});
map.on("mouseup touchend mousemove touchmove", () => clearTimeout(pressTimer));

// ── Save marker ───────────────────────────────────────────────────────────────

document.getElementById("saveBtn").addEventListener("click", async () => {
  if (!selectedCategory) return;

  const note = document.getElementById("noteInput").value.trim();
  const fd = new FormData();
  fd.append("lat",  pendingLat);
  fd.append("lng",  pendingLng);
  fd.append("type", selectedCategory.id);
  if (selectedSubtype)    fd.append("subtype",  selectedSubtype);
  if (selectedDifficulty) fd.append("severity", selectedDifficulty);
  if (note)               fd.append("note",     note);
  if (currentPhoto)       fd.append("photo",    currentPhoto);

  try {
    const res = await fetch(`${API}/markers`, { method: "POST", body: fd });
    if (!res.ok) throw new Error(await res.text());
    const marker = await res.json();
    addMarkerToMap(marker);
    closeSheet();
    showToast("Marker saved ✓");
  } catch (err) {
    showToast("Error — " + err.message);
  }
});

// ── Locate ────────────────────────────────────────────────────────────────────

document.getElementById("locateBtn").addEventListener("click", () => {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      if (locationMarker) locationMarker.setLatLng([lat, lng]);
      else {
        locationMarker = L.circleMarker([lat, lng], {
          radius: 8, fillColor: "#e94560", color: "#fff", weight: 2, fillOpacity: 1,
        }).addTo(map);
      }
      map.setView([lat, lng], 17);
    },
    err => showToast("Location error: " + err.message),
    { enableHighAccuracy: true, timeout: 8000 },
  );
});

// ── Map markers ───────────────────────────────────────────────────────────────

function getCat(id) {
  return CATEGORIES.find(c => c.id === id) || { icon: "❓", label: id };
}

function makeIcon(type) {
  const cat   = getCat(type);
  const color = TYPE_COLORS[type] || "#ccc";
  return L.divIcon({
    className: "",
    html: `<div style="
      background:${color};border:2px solid #fff;border-radius:50%;
      width:34px;height:34px;display:flex;align-items:center;justify-content:center;
      font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.5);">${cat.icon}</div>`,
    iconSize:   [34, 34],
    iconAnchor: [17, 17],
  });
}

function addMarkerToMap(m) {
  const cat = getCat(m.type);
  const lines = [
    `<b>${cat.icon} ${cat.label}</b>`,
    m.subtype  ? `<span style="color:#aaa;font-size:12px">${m.subtype}</span>` : "",
    m.severity ? `Difficulty: ${m.severity}` : "",
    m.note     ? m.note : "",
    m.photo_url ? `<img src="${m.photo_url}" style="max-width:160px;border-radius:6px;margin-top:6px">` : "",
    `<small style="color:#889">${new Date(m.created_at).toLocaleString()}</small>`,
  ].filter(Boolean).join("<br>");

  L.marker([m.lat, m.lng], { icon: makeIcon(m.type) })
    .addTo(map)
    .bindPopup(lines);
}

async function loadMarkers() {
  const b = map.getBounds();
  try {
    const res = await fetch(
      `${API}/markers?min_lat=${b.getSouth()}&min_lng=${b.getWest()}&max_lat=${b.getNorth()}&max_lng=${b.getEast()}`
    );
    if (!res.ok) return;
    const markers = await res.json();
    markers.forEach(addMarkerToMap);
  } catch (_) { /* silently fail during startup */ }
}

map.on("moveend", loadMarkers);
loadMarkers();

// ── Toast ─────────────────────────────────────────────────────────────────────

function showToast(msg, duration = 2500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}
</script>
</body>
</html>
